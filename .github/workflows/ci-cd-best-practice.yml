# Best Practice CI/CD Pipeline for Spring Boot + Docker
# 
# This workflow includes:
# - Tests, linting, security scanning
# - Multi-stage Docker builds (no duplicate builds)
# - Proper caching
# - Security scanning
# - Deployment strategies
# - Environment-specific deployments

name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "develop" ]
  # Allow manual trigger
  workflow_dispatch:

# Define environment variables at workflow level
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  JAVA_VERSION: '21'

# Minimal required permissions (security best practice)
permissions:
  contents: read
  packages: write
  security-events: write  # For CodeQL
  pull-requests: write    # For PR comments

jobs:
  # ============================================
  # Job 1: Build and Test
  # ============================================
  test:
    name: Test & Quality Checks
    runs-on: ubuntu-latest
    
    # Service containers for integration tests
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better analysis

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          # Cache read-only on PRs, read-write on main
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Validate Gradle wrapper
        run: |
          gradle/wrapper/gradle-wrapper.jar --version || echo "Wrapper validation skipped"

      # Run tests with coverage
      - name: Run tests with coverage
        run: ./gradlew test jacocoTestReport
        env:
          R2DBC_URL: r2dbc:postgresql://localhost:5432/test_db
          DB_USER: test_user
          DB_PASSWORD: test_password
          FLYWAY_URL: jdbc:postgresql://localhost:5432/test_db
          FLYWAY_USER: test_user
          FLYWAY_PASSWORD: test_password

      # Upload test results
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build/test-results/

      # Upload coverage to Codecov (optional)
      # - name: Upload coverage to Codecov
      #   uses: codecov/codecov-action@v4
      #   with:
      #     file: build/reports/jacoco/test/jacocoTestReport.xml

      # Check code quality
      - name: Run lint checks
        run: ./gradlew ktlintCheck
        continue-on-error: true  # Don't fail build on lint errors

      # Build JAR (without tests - already ran)
      - name: Build application
        run: ./gradlew build -x test

      # Upload JAR artifact for next jobs
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: build/libs/*.jar
          retention-days: 7

  # ============================================
  # Job 2: Security Scanning
  # ============================================
  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      # Dependency vulnerability scanning
      - name: Run dependency check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'personalweb-be'
          path: '.'
          format: 'HTML'
          out: 'reports'
        continue-on-error: true

      # OWASP dependency check results
      - name: Upload dependency check results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: reports/

      # Trivy vulnerability scanner
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # ============================================
  # Job 3: Build and Push Docker Image
  # ============================================
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.event_name != 'pull_request'
    
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tags: ${{ steps.meta.outputs.tags }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up Docker Buildx (better caching, multi-platform)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login to GitHub Container Registry
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extract metadata for tags and labels
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Branch name
            type=ref,event=branch
            # Tag name (for releases)
            type=ref,event=tag
            # Semver tags
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # Git SHA (short)
            type=sha,prefix={{branch}}-,suffix=,format=short
            # Latest tag for main branch
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=Personal Blog Backend
            org.opencontainers.image.description=Spring Boot backend for personal blog
            org.opencontainers.image.vendor=Jiri Hermann

      # Build and push Docker image
      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Multi-platform build (optional)
          # platforms: linux/amd64,linux/arm64
          # Cache configuration
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Build arguments
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ steps.meta.outputs.version }}

      # Scan Docker image for vulnerabilities
      - name: Scan Docker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          format: 'sarif'
          output: 'docker-trivy-results.sarif'
        continue-on-error: true

      - name: Upload Docker scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'docker-trivy-results.sarif'

  # ============================================
  # Job 4: Deploy to Staging (on main branch)
  # ============================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: staging
      url: https://staging.jirihermann.com
    
    steps:
      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd /opt/jiri-site-staging
            
            # Pull latest image
            docker compose pull backend
            
            # Run database migrations
            docker compose run --rm backend ./gradlew flywayMigrate
            
            # Deploy with zero-downtime
            docker compose up -d --no-deps backend
            
            # Health check
            sleep 10
            curl -f http://localhost:8080/actuator/health || exit 1
            
            # Cleanup old images
            docker image prune -f

      # Smoke tests after deployment
      - name: Run smoke tests
        run: |
          sleep 5
          curl -f https://staging.jirihermann.com/actuator/health
          curl -f https://staging.jirihermann.com/api/meta

  # ============================================
  # Job 5: Deploy to Production (manual approval)
  # ============================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [docker, deploy-staging]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://jirihermann.com
    
    steps:
      # Checkout for potential rollback scripts
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PRODUCTION_SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd /opt/jiri-site
            
            # Backup current version
            docker compose ps > backup_$(date +%Y%m%d_%H%M%S).txt
            
            # Pull latest image
            docker compose pull backend
            
            # Run database migrations (with backup)
            docker compose run --rm backend ./gradlew flywayMigrate
            
            # Deploy with zero-downtime (rolling update)
            docker compose up -d --no-deps --scale backend=2 backend
            sleep 15
            docker compose up -d --no-deps --scale backend=1 backend
            
            # Health check
            sleep 10
            curl -f http://localhost:8891/actuator/health || exit 1
            
            # Cleanup
            docker image prune -f

      # Production smoke tests
      - name: Run production smoke tests
        run: |
          sleep 5
          curl -f https://jirihermann.com/actuator/health
          curl -f https://jirihermann.com/api/meta

      # Notify deployment success (optional)
      # - name: Notify Slack
      #   uses: 8398a7/action-slack@v3
      #   with:
      #     status: ${{ job.status }}
      #     text: 'Production deployment completed!'
      #     webhook_url: ${{ secrets.SLACK_WEBHOOK }}

  # ============================================
  # Job 6: Rollback (manual workflow_dispatch)
  # ============================================
  rollback:
    name: Rollback Production
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment:
      name: production-rollback
    
    steps:
      - name: Rollback production deployment
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PRODUCTION_SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd /opt/jiri-site
            
            # Rollback to previous version
            docker compose down
            docker compose pull backend:previous
            docker compose up -d
            
            # Health check
            sleep 10
            curl -f http://localhost:8891/actuator/health || exit 1


